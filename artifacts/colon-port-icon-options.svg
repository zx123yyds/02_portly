  <rect class="bg" width="1280" height="940"/>
  <text class="title" x="40" y="54">Colon Port 风格候选</text>
  <text class="desc" x="40" y="82">全部围绕“: + 端口/入口”展开。每张卡左上是真实菜单栏尺寸，右侧是放大预览。</text>

