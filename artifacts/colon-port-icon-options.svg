    <use href="#b10b" x="130" y="27" width="58" height="58"/>
    <text class="label" x="22" y="104">B10 Open Port</text>
    <text class="desc" x="22" y="128">强调可打开服务。</text>
  </g>

  <rect class="card" x="40" y="535" width="1200" height="250" rx="18"/>
  <text class="label" x="66" y="574">推荐排序</text>
  <text class="desc" x="66" y="606">1. B3 Port Box：最像“端口入口”，小尺寸下不容易看成字母 P。</text>
  <text class="desc" x="66" y="634">2. B2 Loop Port：最接近 B 的思路，同时更简洁圆润。</text>
  <text class="desc" x="66" y="662">3. B8 Route Dot：有“端口连接到服务”的含义，但比当前小飞机图更稳。</text>
  <text class="desc" x="66" y="690">4. B1 Classic P：开发者可能能联想到 Port，但仍可能被看成 P 标识。</text>
  <text class="desc" x="66" y="718">我会避开 B5/B10：小尺寸下要么太细，要么符号太复杂。</text>
  <text class="desc" x="66" y="746">你选编号，比如 B3，我就把它写进 electron/main.ts 并重启 App。</text>
</svg>
